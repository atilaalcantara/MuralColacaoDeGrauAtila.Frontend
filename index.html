<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Mural da Colação do Átila - Deixe sua mensagem de carinho"
    />
    <title>Mural da Colação do Átila</title>

    <!-- Google Fonts: IBM Plex Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Design Tokens -->
    <link rel="stylesheet" href="tokens.css" />

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Camada de mensagens flutuantes (fundo) -->
    <div class="floating-layer" id="floating-layer" aria-hidden="true">
      <!-- Cards spawned by floating-messages.js -->
    </div>

    <!-- CTA principal (overlay) -->
    <div class="cta-overlay">
      <div class="cta-content">
        <h1 class="cta-title">Mural do Átila</h1>
        <p class="cta-subtitle">Mostre seu carinho ao formando</p>
        <button class="cta-button" id="open-modal-btn" type="button">
          Escrever mensagem
        </button>
      </div>
    </div>

    <!-- Modal para escrever mensagem -->
    <div
      class="modal-overlay"
      id="modal-overlay"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-title"
    >
      <div class="modal-container">
        <div class="modal-header">
          <h2 id="modal-title" class="modal-title">Escrever mensagem</h2>
          <button
            class="modal-close"
            id="modal-close-btn"
            type="button"
            aria-label="Fechar"
          >
            ✕
          </button>
        </div>

        <form class="modal-form" id="message-form">
          <div class="form-group">
            <label for="name-input" class="form-label">
              Seu nome
              <span class="form-required">*</span>
            </label>
            <input
              type="text"
              id="name-input"
              name="name"
              maxlength="40"
              required
              autocomplete="name"
              class="form-input"
              placeholder="Digite seu nome"
            />
            <div class="form-counter"><span id="name-counter">0</span>/40</div>
          </div>

          <div class="form-group">
            <label for="message-input" class="form-label">
              Sua mensagem
              <span class="form-required">*</span>
            </label>
            <textarea
              id="message-input"
              name="message"
              maxlength="200"
              required
              rows="4"
              class="form-textarea"
              placeholder="Escreva sua mensagem de carinho..."
            ></textarea>
            <div class="form-counter">
              <span id="message-counter">0</span>/200
            </div>
          </div>

          <button type="submit" class="submit-button" id="submit-btn">
            Enviar
          </button>

          <div class="form-error" id="form-error" role="alert"></div>
        </form>
      </div>
    </div>

    <!-- Feedback de sucesso -->
    <div class="toast" id="toast" role="status" aria-live="polite">
      Enviado ✓
    </div>

    <!-- Firebase via CDN (modular) -->
    <script type="module">
      // Import Firebase modules
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import {
        getAuth,
        signInAnonymously,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
      import {
        getFirestore,
        collection,
        addDoc,
        query,
        orderBy,
        limit,
        getDocs,
        serverTimestamp,
        onSnapshot,
      } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

      // Expor para uso global
      window.firebaseModules = {
        initializeApp,
        getAuth,
        signInAnonymously,
        onAuthStateChanged,
        getFirestore,
        collection,
        addDoc,
        query,
        orderBy,
        limit,
        getDocs,
        serverTimestamp,
        onSnapshot,
      };

      // Sinalizar que Firebase está pronto
      window.firebaseReady = true;
      window.dispatchEvent(new CustomEvent("firebase-ready"));
    </script>

    <!-- App scripts (ordem importante! SEM defer para garantir ordem) -->
    <script src="firebase.js"></script>
    <script src="floating-messages.js"></script>
    <script src="app.js"></script>
  </body>
</html>
